<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digibee Academy Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08070e;
    --surface: #110f1a;
    --surface-hover: #1a1726;
    --border: #221e30;
    --border-focus: #7c3aed;
    --text: #ede9f6;
    --text-muted: #8b80a5;
    --text-dim: #5a5073;
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --accent-soft: rgba(124, 58, 237, 0.12);
    --accent-glow: rgba(124, 58, 237, 0.25);
    --green: #34d399;
    --green-soft: rgba(52, 211, 153, 0.1);
    --amber: #fbbf24;
    --amber-soft: rgba(251, 191, 36, 0.1);
    --red: #f87171;
    --red-soft: rgba(248, 113, 113, 0.1);
    --cyan: #22d3ee;
    --cyan-soft: rgba(34, 211, 238, 0.1);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    height: 34px;
    filter: brightness(1.1);
  }

  .header-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    font-weight: 500;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: var(--surface-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
    box-shadow: 0 0 6px var(--red);
  }

  .status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 20px;
  }

  .welcome-logo {
    height: 48px;
    filter: brightness(1.1);
    animation: floatIn 0.8s ease-out;
  }

  .welcome h2 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: floatIn 0.8s ease-out 0.1s both;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 440px;
    line-height: 1.7;
    animation: floatIn 0.8s ease-out 0.2s both;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 4px;
    animation: floatIn 0.8s ease-out 0.3s both;
  }

  .suggestion-chip {
    padding: 9px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent-light);
    background: var(--accent-soft);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--accent-glow);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    max-width: 780px;
    animation: msgIn 0.35s ease-out;
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message-avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .message.assistant .message-avatar {
    background: linear-gradient(135deg, var(--accent), #9333ea);
    color: white;
  }

  .message.user .message-avatar {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .message-content {
    padding: 16px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.75;
  }

  .message.assistant .message-content {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .message.user .message-content {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white;
    border: none;
  }

  .message-content strong { font-weight: 700; }
  .message-content p { margin-bottom: 8px; }
  .message-content p:last-child { margin-bottom: 0; }

  /* Tool badges */
  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .tool-badge.search_student { background: var(--cyan-soft); color: var(--cyan); }
  .tool-badge.search_by_company { background: var(--green-soft); color: var(--green); }
  .tool-badge.error { background: var(--red-soft); color: var(--red); }
  .tool-badge.thinking { background: var(--amber-soft); color: var(--amber); }

  .tool-badge::before {
    content: '⚡';
    font-size: 10px;
  }

  .tool-badge.error::before { content: '✕'; }
  .tool-badge.thinking::before { content: '⟳'; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent-light);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  /* Input area */
  .input-area {
    padding: 18px 28px 26px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
  }

  .input-area::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    max-width: 780px;
    margin: 0 auto;
  }

  .input-wrapper input {
    flex: 1;
    padding: 14px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: all 0.25s;
  }

  .input-wrapper input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-wrapper input::placeholder {
    color: var(--text-dim);
  }

  .send-btn {
    padding: 14px 22px;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .send-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    font-weight: 500;
  }

  /* Debug panel */
  .debug-toggle {
    position: fixed;
    bottom: 110px;
    right: 28px;
    padding: 7px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    z-index: 50;
    transition: all 0.2s;
  }

  .debug-toggle:hover {
    border-color: var(--accent);
    color: var(--accent-light);
  }

  .debug-panel {
    position: fixed;
    bottom: 150px;
    right: 28px;
    width: 440px;
    max-height: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    overflow-y: auto;
    z-index: 50;
    display: none;
    animation: msgIn 0.2s;
  }

  .debug-panel.active { display: block; }

  .debug-panel h4 {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .debug-panel pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 14px;
  }

  /* Animations */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .chat-area { padding: 16px; }
    .input-area { padding: 12px 16px 20px; }
    .suggestions { gap: 6px; }
    .suggestion-chip { font-size: 12px; padding: 7px 12px; }
    .debug-toggle, .debug-panel { display: none !important; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <img src="/logo.png" alt="Digibee Academy" class="header-logo">
    <div class="header-divider"></div>
    <div>
      <div class="header-title">CSM Explorer</div>
      <div class="header-subtitle">Progresso de alunos & analytics</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <span class="status-dot connected"></span>
      MCP Conectado
    </div>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <img src="/logo.png" alt="Digibee Academy" class="welcome-logo">
    <h2>Academy CSM Explorer</h2>
    <p>Consulte o progresso dos alunos, matrículas por empresa e conclusão de cursos na Digibee Academy.</p>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="askSuggestion(this)">Como está o João Silva?</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Alunos da Acme Corp</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Buscar joao.silva@acme.com</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Progresso da empresa Acme</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Pergunte sobre um aluno ou empresa..." onkeydown="if(event.key==='Enter')sendMessage()" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      Enviar ➜
    </button>
  </div>
  <div class="input-hint">Enter para enviar · Tools: search_student, search_by_company</div>
</div>

<!-- Debug -->
<button class="debug-toggle" onclick="toggleDebug()">{ } Debug</button>
<div class="debug-panel" id="debugPanel">
  <h4>Último request</h4>
  <pre id="debugRequest">—</pre>
  <h4>Última resposta</h4>
  <pre id="debugResponse">—</pre>
</div>

<script>
  const API_ENDPOINT = '/api/query';
  let isLoading = false;

  function toggleDebug() {
    document.getElementById('debugPanel').classList.toggle('active');
  }

  function setDebug(req, res) {
    document.getElementById('debugRequest').textContent = JSON.stringify(req, null, 2);
    document.getElementById('debugResponse').textContent = typeof res === 'string' ? res : JSON.stringify(res, null, 2);
  }

  function askSuggestion(el) {
    document.getElementById('userInput').value = el.textContent;
    sendMessage();
  }

  function detectTool(question) {
    const q = question.toLowerCase();
    // Company-related keywords
    if (q.includes('company') || q.includes('empresa') || q.includes('students from') ||
        q.includes('alunos da') || q.includes('equipe') || q.includes('team') ||
        q.includes('company progress') || q.includes('institution')) {
      return 'search_by_company';
    }
    // Default to student search
    return 'search_student';
  }

  function buildArgs(question, tool) {
    const q = question.trim();

    if (tool === 'search_by_company') {
      // Try to extract company name
      const patterns = [
        /(?:students?\s+from|alunos?\s+d[aoe]s?|company\s+progress\s+for|empresa)\s+(.+)/i,
        /(.+)/
      ];
      for (const p of patterns) {
        const m = q.match(p);
        if (m) return { company: m[1].trim() };
      }
      return { company: q };
    }

    // search_student: detect email vs name
    if (q.includes('@')) {
      return { email: q.match(/[\w.-]+@[\w.-]+/)?.[0] || q };
    }

    // Try to extract name from natural language
    const namePatterns = [
      /(?:how is|como est[áa]|search|buscar|progress of|progresso d[oe])\s+(.+?)(?:\s+doing|\s*\?|$)/i,
      /(.+)/
    ];
    for (const p of namePatterns) {
      const m = q.match(p);
      if (m) return { name: m[1].trim() };
    }

    return { name: q };
  }

  function formatResponse(rawData, tool) {
    // Unwrap Digibee's output wrapper if present
    const data = rawData.output || rawData;

    // Handle not found
    if (data.found === false) {
      return { text: data.message || 'Nenhum resultado encontrado.', mode: 'error' };
    }

    if (tool === 'search_student') {
      const s = data.student || {};
      const sum = data.summary || {};
      let text = `**${s.fullname}** (${s.email})\n\n`;
      text += `**Resumo:** ${sum.total_courses} cursos · ${sum.completed} concluídos · ${sum.in_progress} em andamento · ${sum.not_started} não iniciados\n`;
      text += `**Progresso médio (ativos):** ${sum.avg_progress_active}%\n\n`;

      if (data.active_courses && data.active_courses.length > 0) {
        text += `**Cursos em andamento:**\n`;
        data.active_courses.forEach(c => {
          const bar = c.progress >= 70 ? '🟢' : c.progress >= 30 ? '🟡' : '🔴';
          text += `${bar} ${c.course_name} — ${c.progress}% (${c.steps}) · início ${c.date_started}\n`;
        });
      }

      if (data.not_started_courses && data.not_started_courses.length > 0) {
        text += `\n**Não iniciados:**\n`;
        data.not_started_courses.forEach(c => {
          text += `⚪ ${c.course_name} (${c.steps})\n`;
        });
      }

      if (data.completed_course_names && data.completed_course_names.length > 0) {
        text += `\n**Cursos concluídos:** ${data.completed_course_names.join(', ')}`;
      }

      return { text, mode: 'search_student' };
    }

    if (tool === 'search_by_company') {
      const sum = data.company_summary || {};
      let text = `**Visão geral da empresa:**\n`;
      text += `${sum.total_students} alunos · ${sum.total_enrollments} matrículas · ${sum.total_completed} concluídos · ${sum.total_in_progress} em andamento · ${sum.total_not_started} não iniciados\n\n`;

      if (data.students && data.students.length > 0) {
        text += `**Alunos:**\n`;
        data.students.forEach(s => {
          const status = s.in_progress > 0 ? '🟡' : s.completed > 0 ? '🟢' : '⚪';
          text += `${status} **${s.fullname}** (${s.email}) — ${s.completed} concluídos, ${s.in_progress} em andamento\n`;
          if (s.active_courses && s.active_courses.length > 0) {
            s.active_courses.forEach(c => {
              text += `    ↳ ${c.course_name}: ${c.progress}% (${c.steps})\n`;
            });
          }
        });
      }

      return { text, mode: 'search_by_company' };
    }

    // Fallback
    return { text: JSON.stringify(data, null, 2), mode: null };
  }

  function addMessage(role, content, mode) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = role === 'user' ? 'U' : 'D';

    const body = document.createElement('div');
    body.className = 'message-content';

    if (mode) {
      const badge = document.createElement('div');
      badge.className = `tool-badge ${mode}`;
      badge.textContent = mode.replace(/_/g, ' ');
      body.appendChild(badge);
    }

    const formatted = content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');

    const p = document.createElement('div');
    p.innerHTML = formatted;
    body.appendChild(p);

    div.appendChild(avatar);
    div.appendChild(body);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div;
  }

  function addTyping() {
    const chat = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = 'D';

    const body = document.createElement('div');
    body.className = 'message-content';

    const badge = document.createElement('div');
    badge.className = 'tool-badge thinking';
    badge.textContent = 'consultando';
    body.appendChild(badge);

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(typing);

    div.appendChild(avatar);
    div.appendChild(body);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question || isLoading) return;

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';

    addMessage('user', question);
    addTyping();

    const tool = detectTool(question);
    const args = buildArgs(question, tool);

    const payload = { tool, args };

    try {
      setDebug(payload, 'Loading...');

      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      setDebug(payload, data);
      removeTyping();

      const { text, mode } = formatResponse(data, tool);
      addMessage('assistant', text, mode);

    } catch (err) {
      removeTyping();
      setDebug(payload, { error: err.message });
      addMessage('assistant', 'Erro de conexão: ' + err.message, 'error');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>

</body>
</html>
